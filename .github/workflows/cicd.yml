name: CI/CD Pipeline
# comment2
on:
  push:
    branches:
      - main
      
  workflow_dispatch:

    
env:
  REGISTRY: ${{secrets.AZURE_REGISTRY_LOGIN_SERVER}}
  WEB_IMAGE: elecshop-web
  SERVER_IMAGE: elecshop-server

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: CI — Lint & Test
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm turbo run lint

      - name: Run Tests
        run: pnpm turbo run test

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: Build & Push to ACR, then deploy to Staging via Publish Profile.
# No service principal, no deployment slots needed.
#
# Required GitHub Secrets (global):
#   AZURE_REGISTRY_LOGIN_SERVER, AZURE_REGISTRY_USERNAME, AZURE_REGISTRY_PASSWORD
#   STAGING_WEB_PUBLISH_PROFILE   ← download from Azure Portal (see walkthrough)
#   STAGING_SERVER_PUBLISH_PROFILE
#
# Required GitHub Variables (environment: staging):
#   STAGING_WEB_APP_NAME, STAGING_SERVER_APP_NAME
# ─────────────────────────────────────────────────────────────────────────────
  build-and-deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci

    environment:
      name: staging
      url: ${{ vars.STAGING_WEB_URL }}

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.AZURE_REGISTRY_PASSWORD }}" | docker login $REGISTRY \
            --username "${{ secrets.AZURE_REGISTRY_USERNAME }}" \
            --password-stdin

      - name: Build & Push Web Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.STAGING_API_URL }} \
            -f apps/web/dockerfile \
            -t $REGISTRY/$WEB_IMAGE:${{ github.sha }} \
            -t $REGISTRY/$WEB_IMAGE:staging \
            .
          docker push $REGISTRY/$WEB_IMAGE:${{ github.sha }}
          docker push $REGISTRY/$WEB_IMAGE:staging

      - name: Build & Push Server Image
        run: |
          docker build \
            -f apps/server/dockerfile \
            -t $REGISTRY/$SERVER_IMAGE:${{ github.sha }} \
            -t $REGISTRY/$SERVER_IMAGE:staging \
            .
          docker push $REGISTRY/$SERVER_IMAGE:${{ github.sha }}
          docker push $REGISTRY/$SERVER_IMAGE:staging

      # ── Deploy via Publish Profile (no service principal needed) ─────────────
      - name: Deploy Web Image to Staging App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.STAGING_WEB_APP_NAME }}
          publish-profile: ${{ secrets.STAGING_WEB_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ github.sha }}

      - name: Deploy Server Image to Staging App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.STAGING_SERVER_APP_NAME }}
          publish-profile: ${{ secrets.STAGING_SERVER_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ github.sha }}

      - name: Summary
        run: |
          echo "### ✅ Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to ACR and deployed via Publish Profile." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ vars.STAGING_WEB_APP_NAME }}\` | \`$REGISTRY/$WEB_IMAGE:staging\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ vars.STAGING_SERVER_APP_NAME }}\` | \`$REGISTRY/$SERVER_IMAGE:staging\` |" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: Promote Staging → Production (retag only, no rebuild)
# Pauses for manual approval via GitHub Environment.
# Set up required reviewers at: Settings > Environments > production
#
# Required GitHub Secrets:
#   PRODUCTION_WEB_PUBLISH_PROFILE, PRODUCTION_SERVER_PUBLISH_PROFILE
#
# Required GitHub Variables (environment: production):
#   PRODUCTION_WEB_APP_NAME, PRODUCTION_SERVER_APP_NAME
# ─────────────────────────────────────────────────────────────────────────────
  promote-production:
    name: Promote to Production (retag)
    runs-on: ubuntu-latest
    needs: build-and-deploy-staging

    environment:
      name: production

    permissions:
      contents: read

    steps:
      - name: Retag Web Image (staging → latest)
        run: |
          TOKEN=$(curl -s -u "${{ secrets.AZURE_REGISTRY_USERNAME }}:${{ secrets.AZURE_REGISTRY_PASSWORD }}" \
            "https://$REGISTRY/oauth2/token?service=$REGISTRY&scope=repository:$WEB_IMAGE:pull,push" \
            | jq -r '.access_token')

          MANIFEST=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://$REGISTRY/v2/$WEB_IMAGE/manifests/staging")

          MEDIA_TYPE=$(echo "$MANIFEST" | jq -r '.mediaType')

          curl -s -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: $MEDIA_TYPE" \
            -d "$MANIFEST" \
            "https://$REGISTRY/v2/$WEB_IMAGE/manifests/latest"

          echo "$WEB_IMAGE: staging → latest"

      - name: Retag Server Image (staging → latest)
        run: |
          TOKEN=$(curl -s -u "${{ secrets.AZURE_REGISTRY_USERNAME }}:${{ secrets.AZURE_REGISTRY_PASSWORD }}" \
            "https://$REGISTRY/oauth2/token?service=$REGISTRY&scope=repository:$SERVER_IMAGE:pull,push" \
            | jq -r '.access_token')

          MANIFEST=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://$REGISTRY/v2/$SERVER_IMAGE/manifests/staging")

          MEDIA_TYPE=$(echo "$MANIFEST" | jq -r '.mediaType')

          curl -s -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: $MEDIA_TYPE" \
            -d "$MANIFEST" \
            "https://$REGISTRY/v2/$SERVER_IMAGE/manifests/latest"

          echo "$SERVER_IMAGE: staging → latest"

      # ── Deploy to Production via Publish Profile ─────────────────────────────
      - name: Deploy Web Image to Production App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.PRODUCTION_WEB_APP_NAME }}
          publish-profile: ${{ secrets.PRODUCTION_WEB_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:latest

      - name: Deploy Server Image to Production App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.PRODUCTION_SERVER_APP_NAME }}
          publish-profile: ${{ secrets.PRODUCTION_SERVER_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:latest

      - name: Summary
        run: |
          echo "### ✅ Production Promotion Complete" >> $GITHUB_STEP_SUMMARY
          echo "No rebuild — \`staging\` manifests retagged to \`latest\` via ACR HTTP API." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ vars.PRODUCTION_WEB_APP_NAME }}\` | \`$REGISTRY/$WEB_IMAGE:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ vars.PRODUCTION_SERVER_APP_NAME }}\` | \`$REGISTRY/$SERVER_IMAGE:latest\` |" >> $GITHUB_STEP_SUMMARY
