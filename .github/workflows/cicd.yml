name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

env:
  REGISTRY: "AZURE_REGISTRY_LOGIN_SERVER"
  WEB_IMAGE: elecshop-web
  SERVER_IMAGE: elecshop-server

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: CI — Lint & Test
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm turbo run lint

      - name: Run Tests
        run: pnpm turbo run test

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: Build & Push to ACR with :staging tag
# Runs after CI passes on every push to main.
# Tags images with :<sha> and :staging.
# App Service (staging slot) watches :staging and auto-deploys via ACR webhook.
# ─────────────────────────────────────────────────────────────────────────────
  build-and-deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    needs: ci

    environment:
      name: staging
      url: https://${{ vars.STAGING_WEB_APP_NAME }}.azurewebsites.net

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.AZURE_REGISTRY_PASSWORD }}" | docker login $REGISTRY \
            --username "${{ secrets.AZURE_REGISTRY_USERNAME }}" \
            --password-stdin

      - name: Build & Push Web Image
        run: |
          docker build \
            -f apps/web/dockerfile \
            -t $REGISTRY/$WEB_IMAGE:${{ github.sha }} \
            -t $REGISTRY/$WEB_IMAGE:staging \
            .
          docker push $REGISTRY/$WEB_IMAGE:${{ github.sha }}
          docker push $REGISTRY/$WEB_IMAGE:staging

      - name: Build & Push Server Image
        run: |
          docker build \
            -f apps/server/dockerfile \
            -t $REGISTRY/$SERVER_IMAGE:${{ github.sha }} \
            -t $REGISTRY/$SERVER_IMAGE:staging \
            .
          docker push $REGISTRY/$SERVER_IMAGE:${{ github.sha }}
          docker push $REGISTRY/$SERVER_IMAGE:staging

      - name: Summary
        run: |
          echo "### Staging Images Pushed to ACR" >> $GITHUB_STEP_SUMMARY
          echo "Azure App Service (staging) will auto-deploy via ACR webhook." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`$REGISTRY/$WEB_IMAGE\` | \`${{ github.sha }}\`, \`staging\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`$REGISTRY/$SERVER_IMAGE\` | \`${{ github.sha }}\`, \`staging\` |" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: Promote Staging → Production (retag only, no rebuild)
# Runs after staging deploy. Pauses for manual approval via GitHub Environment.
# Set up required reviewers at: Settings > Environments > production
# Uses ACR HTTP API to retag :staging → :latest server-side (no image transfer).
# App Service (production) watches :latest and auto-deploys via ACR webhook.
# ─────────────────────────────────────────────────────────────────────────────
  promote-production:
    name: Promote to Production (retag)
    runs-on: ubuntu-latest
    needs: build-and-deploy-staging

    environment:
      name: production

    permissions:
      contents: read

    steps:
      - name: Retag Web Image (staging → latest)
        run: |
          TOKEN=$(curl -s -u "${{ secrets.AZURE_REGISTRY_USERNAME }}:${{ secrets.AZURE_REGISTRY_PASSWORD }}" \
            "https://$REGISTRY/oauth2/token?service=$REGISTRY&scope=repository:$WEB_IMAGE:pull,push" \
            | jq -r '.access_token')

          MANIFEST=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://$REGISTRY/v2/$WEB_IMAGE/manifests/staging")

          MEDIA_TYPE=$(echo "$MANIFEST" | jq -r '.mediaType')

          curl -s -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: $MEDIA_TYPE" \
            -d "$MANIFEST" \
            "https://$REGISTRY/v2/$WEB_IMAGE/manifests/latest"

          echo "$WEB_IMAGE: staging → latest"

      - name: Retag Server Image (staging → latest)
        run: |
          TOKEN=$(curl -s -u "${{ secrets.AZURE_REGISTRY_USERNAME }}:${{ secrets.AZURE_REGISTRY_PASSWORD }}" \
            "https://$REGISTRY/oauth2/token?service=$REGISTRY&scope=repository:$SERVER_IMAGE:pull,push" \
            | jq -r '.access_token')

          MANIFEST=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://$REGISTRY/v2/$SERVER_IMAGE/manifests/staging")

          MEDIA_TYPE=$(echo "$MANIFEST" | jq -r '.mediaType')

          curl -s -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: $MEDIA_TYPE" \
            -d "$MANIFEST" \
            "https://$REGISTRY/v2/$SERVER_IMAGE/manifests/latest"

          echo "$SERVER_IMAGE: staging → latest"

      - name: Summary
        run: |
          echo "### Production Promotion Complete" >> $GITHUB_STEP_SUMMARY
          echo "No rebuild — \`staging\` manifests retagged to \`latest\` via ACR HTTP API." >> $GITHUB_STEP_SUMMARY
          echo "Azure App Service (production) will auto-deploy via ACR webhook." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Promoted Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`$REGISTRY/$WEB_IMAGE\` | \`staging\` → \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`$REGISTRY/$SERVER_IMAGE\` | \`staging\` → \`latest\` |" >> $GITHUB_STEP_SUMMARY